<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- REPLACED: MQTT and Firebase scripts removed. Added Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <title>Counter Display</title>
    <style>
        /* Existing Styles strictly retained */
        #statusBanner {
            font-size: 22px;
            font-weight: bold;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
            border-radius: 5px;
            font-family: sans-serif;
            transition: all 0.3s ease;
        }
        .connected {
            background-color: #d4edda;
            color: #155724;
            border: 2px solid #c3e6cb;
        }
        .disconnected {
            background-color: #f8d7da;
            color: #721c24;
            border: 2px solid #f5c6cb;
        }
        #videoContainer {
            position: relative;
            display: inline-block;
            margin-top: 20px;
            border: 2px solid #333;
        }
        #timeOverlay {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: rgba(0, 0, 0, 0.6);
            color: #00FF00;
            padding: 5px 10px;
            font-family: monospace;
            font-size: 18px;
            border-radius: 4px;
            z-index: 10;
            display: none;
        }
        #liveFeedBtn {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
        #controlPanel {
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #ccc;
            display: inline-block;
            background-color: #f9f9f9;
        }
        .f-btn {
            padding: 10px 20px;
            margin-right: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border: 1px solid #888;
            background-color: #eee;
            transition: background-color 0.2s;
        }
        .f-btn.active {
            background-color: yellow;
            border-color: #d4d400;
        }
        #commandGroup {
            margin-top: 15px;
        }
        #cmdInput {
            padding: 8px;
            font-size: 16px;
            width: 200px;
        }
        #cmdSendBtn {
            padding: 8px 15px;
            font-size: 16px;
            cursor: pointer;
        }
        #logContainer {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 600px;
        }
        #logContainer label {
            font-weight: bold;
            margin-bottom: 5px;
            font-family: sans-serif;
        }
        #responseBox {
            width: 100%;
            height: 150px;
            background-color: #1e1e1e;
            color: #00ff00;
            font-family: monospace;
            font-size: 14px;
            padding: 10px;
            border: 2px solid #333;
            border-radius: 4px;
            resize: none;
            overflow-y: auto;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    
    <div id="statusBanner" class="disconnected">CAMERA DISCONNECTED</div>

    <h1>LIVE CAM BY ANMOL</h1>
    
    <button id="liveFeedBtn">Start live feed</button>
    <br>

    <div id="videoContainer">
        <div id="timeOverlay">Waiting for time...</div>
        <img id="myImage" src="" style="display:none; max-width: 100%;" alt="Live Feed">
    </div>

    <div id="controlPanel">
        <div>
            <button id="btnF1" class="f-btn">F1</button>
            <button id="btnF2" class="f-btn">F2</button>
            <button id="btnF3" class="f-btn">F3</button>
            <button id="btnF4" class="f-btn">F4</button>
            <button id="btnF5" class="f-btn">F5</button>
        </div>
        
        <div id="commandGroup">
            <input type="text" id="cmdInput" value="0">
            <button id="cmdSendBtn">Send Command</button>
        </div>
    </div>

    <div id="logContainer">
        <label for="responseBox">Response:</label>
        <textarea id="responseBox" readonly></textarea>
    </div>

<script>
  // ==========================================
  // --- SUPABASE INITIALIZATION ---
  // ==========================================
  const SUPABASE_URL = "https://fctxrtzabfippyjuvjei.supabase.co"; 
  const SUPABASE_ANON_KEY = "sb_publishable_9ofq_P6c2EEADXPfxW0Dsg_yKT6ZnVD";
  
  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // --- HTML Elements ---
  const imgElement = document.getElementById('myImage');
  const timeElement = document.getElementById('timeOverlay');
  const liveBtn = document.getElementById('liveFeedBtn');
  const statusBanner = document.getElementById('statusBanner');
  const responseBox = document.getElementById('responseBox');
  const cmdInput = document.getElementById('cmdInput');
  const cmdSendBtn = document.getElementById('cmdSendBtn');

  // --- State Variables ---
  let isLive = 0;
  let lastHeartbeatTime = Date.now(); 
  let isCameraConnected = false;
  let lastLogStr = "";
  let fStates = { f1: 0, f2: 0, f3: 0, f4: 0, f5: 0 };

  // Update a specific field in the database helper function
  async function updateDB(payload) {
      await db.from('device_status').update(payload).eq('id', 1);
  }

  // ==========================================
  // --- REALTIME DATA SYNC ---
  // ==========================================
  
  // 1. Fetch initial state on page load
  async function fetchInitialState() {
      const { data, error } = await db.from('device_status').select('*').eq('id', 1).single();
      if (data) processDBUpdate(data);
  }

  // 2. Process incoming row updates (Heartbeat, Image, Logs, Time)
  function processDBUpdate(row) {
      // Handle Heartbeat (camon)
      lastHeartbeatTime = Date.now();
      if (!isCameraConnected) {
          isCameraConnected = true;
          statusBanner.textContent = "CAMERA ONLINE";
          statusBanner.className = "connected";
      }

      // Handle Image Stream
      if (isLive === 1 && row.image_url) {
          imgElement.src = row.image_url;
      }

      // Handle Time Update
      if (isLive === 1 && row.cctv_time) {
          timeElement.textContent = row.cctv_time;
      }

      // Handle Logs (Deduplicate logs since heartbeat triggers row updates)
      if (row.nlog && row.nlog !== lastLogStr) {
          lastLogStr = row.nlog;
          const prefix = responseBox.value === "" ? "" : "\n";
          responseBox.value += prefix + ">> " + row.nlog;
          responseBox.scrollTop = responseBox.scrollHeight;
      }
  }

  // 3. Subscribe to Realtime Postgres Changes
  const channel = db.channel('schema-db-changes')
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'device_status', filter: 'id=eq.1' }, (payload) => {
        processDBUpdate(payload.new);
    })
    .subscribe();

  // ==========================================
  // --- CONNECTION TIMEOUT LOGIC ---
  // ==========================================
  setInterval(() => {
      const timeSinceLastHeartbeat = Date.now() - lastHeartbeatTime;
      if (timeSinceLastHeartbeat > 40000) {
          if (isCameraConnected) {
              isCameraConnected = false;
              statusBanner.textContent = "CAMERA OFFLINE";
              statusBanner.className = "disconnected";
              
              if (isLive === 1) {
                  isLive = 0;
                  updateDB({ live: 0 }); 
                  liveBtn.textContent = "Start live feed";
                  imgElement.style.display = 'none';
                  timeElement.style.display = 'none';
              }
          }
      }
  }, 1000);

  // ==========================================
  // --- BUTTON AND CONTROL LOGIC ---
  // ==========================================
  
  // Live Feed Button
  liveBtn.addEventListener('click', () => {
      isLive = isLive === 0 ? 1 : 0;
      updateDB({ live: isLive });
      
      liveBtn.textContent = isLive === 1 ? "Live feed started" : "Start live feed";
      
      if(isLive === 1) {
          imgElement.style.display = 'block';
          timeElement.style.display = 'block';
      } else {
          imgElement.style.display = 'none';
          timeElement.style.display = 'none';
          imgElement.src = ""; // Clear image stream
      }
  });

  // F1 to F5 Buttons
  for (let i = 1; i <= 5; i++) {
      const btn = document.getElementById(`btnF${i}`);
      const field = `f${i}`;

      btn.addEventListener('click', () => {
          fStates[field] = fStates[field] === 0 ? 1 : 0;
          
          // Send update to database
          updateDB({ [field]: fStates[field] });

          if (fStates[field] === 1) {
              btn.classList.add('active');
          } else {
              btn.classList.remove('active');
          }
      });
  }

  // Command Box
  cmdInput.value = "0";
  cmdSendBtn.addEventListener('click', () => {
      const commandValue = cmdInput.value;
      updateDB({ command: commandValue });
  });

  // ==========================================
  // --- CLEANUP ON DISCONNECT ---
  // ==========================================
  // Replaces Firebase onDisconnect() to reset UI controls when tab closes
  window.addEventListener('beforeunload', () => {
      updateDB({ 
          live: 0, 
          f1: 0, f2: 0, f3: 0, f4: 0, f5: 0, 
          command: "0" 
      });
  });

  // Start Application
  fetchInitialState();
  responseBox.value = "";

</script>	
</body>
</html>
